components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature

  parameters:
    ModuleKey:
      in: path
      name: moduleKey
      required: true
      schema:
        type: string
      examples:
        dummyAuth:
          value: dummy-auth-connector
        dummyStudentData:
          value: dummy-student-data-connector
    StudentRef:
      in: path
      name: studentRef
      required: true
      schema:
        type: string
    ProviderId:
      in: path
      name: providerId
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
    CompanyId:
      in: path
      name: companyId
      required: true
      schema:
        type: string
        format: uuid
    ImportResultId:
      in: path
      name: importResultId
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      in: path
      name: applicationId
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      in: path
      name: assignmentId
      required: true
      schema:
        type: string
        format: uuid
    HourLogId:
      in: path
      name: hourLogId
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: string
        format: uuid
    ExternalStudentId:
      in: path
      name: externalStudentId
      required: true
      schema:
        type: string

  schemas:
    Company:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        address:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        address:
          type: string
          nullable: true

    CompanyPatch:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        address:
          type: string
          nullable: true

    HealthStatus:
      type: object
      required: [ status, checkedAt ]
      properties:
        status:
          type: string
          enum: [ ok, degraded, down ]
        db:
          type: string
          enum: [ ok, down ]
        setupCompleted:
          type: boolean
        checkedAt:
          type: string
          format: date-time

    SetupStatus:
      type: object
      required: [ completed, collegeName, settings, steps, missingRequirements ]
      properties:
        completed:
          type: boolean
        collegeName:
          type: string
        settings:
          type: object
        steps:
          type: object
        missingRequirements:
          type: array
          items:
            type: string

    SetupModuleOption:
      type: object
      required: [ moduleKey, displayName, version, moduleType, setupTier ]
      properties:
        moduleKey:
          type: string
        displayName:
          type: string
        version:
          type: string
        moduleType:
          type: string
        description:
          type: string
        dependencies:
          type: array
          items:
            type: string
        setupTier:
          type: string
          enum: [ required, recommended, optional ]
        configurationSchema:
          type: object
        installed:
          type: boolean

    SetupInstanceInput:
      type: object
      required: [ collegeName ]
      properties:
        collegeName:
          type: string
        locale:
          type: string
        timezone:
          type: string
        demoMode:
          type: boolean

    SetupConnectorInput:
      type: object
      required: [ moduleKey ]
      properties:
        moduleKey:
          type: string
        useDemoProvider:
          type: boolean
        values:
          type: object
        secrets:
          type: object
          additionalProperties:
            type: string

    SetupAdminInput:
      type: object
      required: [ username, password ]
      properties:
        username:
          type: string
        password:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email

    SetupConnectorTestResult:
      type: object
      required: [ results, allOk ]
      properties:
        allOk:
          type: boolean
        results:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              moduleKey:
                type: string
              ok:
                type: boolean
              message:
                type: string

    ModuleCapability:
      type: object
      required: [ key, enabled ]
      properties:
        key:
          type: string
        enabled:
          type: boolean
        version:
          type: string

    ModuleType:
      type: string
      enum:
        - auth_connector
        - student_data_connector
        - notification_connector
        - workflow_connector
        - scraper_connector
        - document_template
        - reporting_extension
        - rules_extension

    ModuleStatus:
      type: string
      enum: [ installed, enabled, disabled, misconfigured, failing ]

    ModuleManifest:
      type: object
      required: [ moduleKey, displayName, version, moduleType, capabilities ]
      properties:
        moduleKey:
          type: string
          examples: [ dummy-auth-connector, dummy-student-data-connector ]
        displayName:
          type: string
        version:
          type: string
        moduleType:
          $ref: "#/components/schemas/ModuleType"
        description:
          type: string
        author:
          type: string
        license:
          type: string
        platformVersion:
          type: string
        capabilities:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string
        features:
          type: array
          items:
            $ref: "#/components/schemas/ModuleFeatureDefinition"
        providedContracts:
          type: array
          items:
            type: string
          examples:
            - [ auth.v1 ]
            - [ student_data.v1 ]
        requiredContracts:
          type: array
          items:
            type: string
        requiredSecrets:
          type: array
          items:
            type: string
        configurationSchema:
          type: object
          additionalProperties: true
        permissions:
          type: array
          items:
            type: string
        webhookSubscriptions:
          type: array
          items:
            type: string
        eventSubscriptions:
          type: array
          items:
            type: string

    ModuleFeatureDefinition:
      type: object
      required: [ key, name, default ]
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        default:
          type: boolean
        capabilities:
          type: array
          items:
            type: string

    AvailableModule:
      type: object
      required: [ moduleKey, displayName, version, moduleType, installed, capabilities ]
      properties:
        moduleKey:
          type: string
        displayName:
          type: string
        version:
          type: string
        moduleType:
          $ref: "#/components/schemas/ModuleType"
        description:
          type: string
        dependencies:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
        features:
          type: array
          items:
            $ref: "#/components/schemas/ModuleFeatureDefinition"
        providedContracts:
          type: array
          items:
            type: string
        installed:
          type: boolean

    ModuleFeature:
      type: object
      required: [ featureKey, name, enabled ]
      properties:
        featureKey:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        capabilities:
          type: array
          items:
            type: string

    ModuleFeaturesInput:
      type: object
      required: [ features ]
      properties:
        features:
          type: array
          items:
            type: object
            required: [ featureKey, enabled ]
            properties:
              featureKey:
                type: string
              enabled:
                type: boolean

    InstalledModule:
      type: object
      required: [ moduleKey, displayName, version, moduleType, status, enabled ]
      properties:
        moduleKey:
          type: string
        displayName:
          type: string
        version:
          type: string
        moduleType:
          $ref: "#/components/schemas/ModuleType"
        status:
          $ref: "#/components/schemas/ModuleStatus"
        installState:
          type: string
          enum: [ available, installed, uninstalled ]
        enabled:
          type: boolean
        dependencies:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
        features:
          type: array
          items:
            $ref: "#/components/schemas/ModuleFeature"
        health:
          $ref: "#/components/schemas/ModuleHealth"
        installedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ModuleConfig:
      type: object
      required: [ moduleKey, configured ]
      properties:
        moduleKey:
          type: string
        configured:
          type: boolean
        values:
          type: object
          additionalProperties: true
          description: Non-secret module configuration values.
        secretNames:
          type: array
          items:
            type: string
          description: Names of configured secrets. Secret values are never returned.
        updatedAt:
          type: string
          format: date-time

    ModuleConfigInput:
      type: object
      properties:
        values:
          type: object
          additionalProperties: true
        secrets:
          type: object
          additionalProperties:
            type: string
          writeOnly: true

    ModuleTestResult:
      type: object
      required: [ moduleKey, status, checkedAt ]
      properties:
        moduleKey:
          type: string
        status:
          type: string
          enum: [ success, failure ]
        contract:
          type: string
          examples: [ auth.v1, student_data.v1 ]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        checkedAt:
          type: string
          format: date-time

    ModuleHealth:
      type: object
      required: [ moduleKey, status, checkedAt ]
      properties:
        moduleKey:
          type: string
        status:
          type: string
          enum: [ ok, degraded, down, unknown ]
        message:
          type: string
        checkedAt:
          type: string
          format: date-time

    ProviderCapability:
      type: object
      required: [ providerKey, providerType, status, capabilities ]
      properties:
        moduleKey:
          type: string
        providerKey:
          type: string
        providerType:
          $ref: "#/components/schemas/ProviderType"
        status:
          type: string
          enum: [ configured, connected, failing, disabled ]
        capabilities:
          type: array
          items:
            type: string

    ProviderType:
      type: string
      enum: [ auth, student_data, email, workflow, scraper ]

    ProviderConnection:
      type: object
      required: [ id, moduleKey, providerKey, providerType, baseUrl, enabled, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        moduleKey:
          type: string
          examples: [ dummy-auth-connector, dummy-student-data-connector ]
        providerKey:
          type: string
          examples: [ dummy-auth, datamcp, zavu, n8n, firecrawl ]
        providerType:
          $ref: "#/components/schemas/ProviderType"
        baseUrl:
          type: string
          format: uri
        enabled:
          type: boolean
        authMethod:
          type: string
          enum: [ none, bearer_token, api_key, oauth2, signed_webhook ]
        capabilities:
          type: array
          items:
            type: string
        fieldMappings:
          type: object
          additionalProperties: true
        lastHealthStatus:
          type: string
          enum: [ unknown, ok, degraded, down ]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProviderConnectionRequest:
      type: object
      required: [ moduleKey, providerKey, providerType, baseUrl, authMethod ]
      properties:
        moduleKey:
          type: string
        providerKey:
          type: string
        providerType:
          $ref: "#/components/schemas/ProviderType"
        baseUrl:
          type: string
          format: uri
        authMethod:
          type: string
          enum: [ none, bearer_token, api_key, oauth2, signed_webhook ]
        secret:
          type: string
          writeOnly: true
        fieldMappings:
          type: object
          additionalProperties: true

    UpdateProviderConnectionRequest:
      type: object
      properties:
        baseUrl:
          type: string
          format: uri
        enabled:
          type: boolean
        secret:
          type: string
          writeOnly: true
        fieldMappings:
          type: object
          additionalProperties: true

    ProviderTestResult:
      type: object
      required: [ status, checkedAt ]
      properties:
        status:
          type: string
          enum: [ success, failure ]
        message:
          type: string
        checkedAt:
          type: string
          format: date-time

    ProviderSchema:
      type: object
      required: [ providerKey, fields ]
      properties:
        providerKey:
          type: string
        providerProfile:
          type: string
        fields:
          type: array
          items:
            type: object
            required: [ path, type ]
            properties:
              path:
                type: string
              type:
                type: string
              required:
                type: boolean
              description:
                type: string

    AuthLoginRequest:
      type: object
      required: [ username, password ]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        providerProfile:
          type: string
          description: Forwarded to the active auth connector when supported.

    AuthTokenResponse:
      type: object
      required: [ accessToken, tokenType, expiresIn, issuedByModule ]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          enum: [ Bearer ]
        expiresIn:
          type: integer
        refreshToken:
          type: string
        issuedByModule:
          type: string
          examples: [ dummy-auth-connector ]
        user:
          $ref: "#/components/schemas/CurrentUser"

    AuthIntrospectionResult:
      type: object
      required: [ active, checkedByModule ]
      properties:
        active:
          type: boolean
        checkedByModule:
          type: string
          examples: [ dummy-auth-connector ]
        externalUserId:
          type: string
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        expiresAt:
          type: string
          format: date-time

    StudentSearchResult:
      type: object
      required: [ studentRef, externalStudentId, displayName, resolvedByModule ]
      properties:
        studentRef:
          type: string
        externalStudentId:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        programCode:
          type: string
        programName:
          type: string
        resolvedByModule:
          type: string
          examples: [ dummy-student-data-connector ]

    CurrentUser:
      type: object
      required: [ externalUserId, providerKey, roles ]
      properties:
        externalUserId:
          type: string
        moduleKey:
          type: string
        providerKey:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        studentRef:
          type: string

    UserRole:
      type: string
      enum:
        [
          student,
          coordinator,
          faculty_supervisor,
          external_supervisor,
          admin,
          auditor
        ]

    AcademicProfile:
      type: object
      required: [ studentRef, externalStudentId, programCode, programName, academicStatus ]
      properties:
        studentRef:
          type: string
        externalStudentId:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        facultyCode:
          type: string
        facultyName:
          type: string
        programCode:
          type: string
        programName:
          type: string
        degreeLevel:
          type: string
          enum:
            [
              technical,
              teaching,
              bachelor,
              engineering,
              architecture,
              master,
              doctorate,
              other
            ]
        modality:
          type: string
          enum: [ onsite, online, hybrid, other ]
        cohort:
          type: string
        academicStatus:
          type: string
          enum: [ active, egresado, graduate_candidate, inactive, unknown ]
        approvedCredits:
          type: number
        totalCredits:
          type: number
        approvedSubjects:
          type: integer
        totalSubjects:
          type: integer
        progressPercentage:
          type: number
          minimum: 0
          maximum: 100
        gpa:
          type: number
        completedCourseCodes:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        lastSyncedAt:
          type: string
          format: date-time

    StudentProfile:
      type: object
      required: [ studentRef, academicProfile, eligibility ]
      properties:
        studentRef:
          type: string
        academicProfile:
          $ref: "#/components/schemas/AcademicProfile"
        eligibility:
          $ref: "#/components/schemas/RuleEvaluationResult"
        completedHours:
          type: number
        remainingHours:
          type: number
        requiredDocuments:
          type: array
          items:
            $ref: "#/components/schemas/DocumentRequirement"
        recommendedProjectCategories:
          type: array
          items:
            type: string

    RequirementRule:
      allOf:
        - $ref: "#/components/schemas/RequirementRuleInput"
        - type: object
          required: [ id, createdAt ]
          properties:
            id:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time

    RequirementRuleInput:
      type: object
      required: [ name, requiredHours ]
      properties:
        name:
          type: string
        scope:
          type: object
          description: Defaults to an empty object when omitted.
          properties:
            facultyCode:
              type: string
            programCode:
              type: string
            degreeLevel:
              type: string
            modality:
              type: string
        requiredHours:
          type: number
        categoryHours:
          type: object
          additionalProperties:
            type: number
        minimumProgressPercentage:
          type: number
        requiredAcademicStatuses:
          type: array
          items:
            type: string
        requiredCourseCodes:
          type: array
          items:
            type: string
        calendarDuration:
          type: object
          properties:
            value:
              type: integer
            unit:
              type: string
              enum: [ days, weeks, months, years ]
        active:
          type: boolean
          default: true

    RuleEvaluationRequest:
      type: object
      required: [ studentRef ]
      properties:
        studentRef:
          type: string
        projectId:
          type: string
          format: uuid
        academicProfile:
          $ref: "#/components/schemas/AcademicProfile"

    RuleEvaluationResult:
      type: object
      required: [ status, requiredHours, matchedRuleIds ]
      properties:
        status:
          type: string
          enum: [ eligible, not_eligible, manual_review, missing_data ]
        requiredHours:
          type: number
        requiredCategoryHours:
          type: object
          additionalProperties:
            type: number
        matchedRuleIds:
          type: array
          items:
            type: string
            format: uuid
        failedRules:
          type: array
          items:
            type: string
        missingData:
          type: array
          items:
            type: string
        explanation:
          type: string

    Project:
      allOf:
        - $ref: "#/components/schemas/ProjectInput"
        - type: object
          required: [ id, status, sourceType, createdAt ]
          properties:
            id:
              type: string
              format: uuid
            status:
              $ref: "#/components/schemas/ProjectStatus"
            sourceType:
              $ref: "#/components/schemas/ProjectSourceType"
            sourceUrl:
              type: string
              format: uri
            extractionConfidence:
              type: number
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ProjectInput:
      type: object
      required: [ title, description, organizationName, categories ]
      properties:
        title:
          type: string
        description:
          type: string
        organizationName:
          type: string
        location:
          type: string
        modality:
          type: string
          enum: [ onsite, remote, hybrid ]
        categories:
          type: array
          items:
            type: string
        capacity:
          type: integer
        startsAt:
          type: string
          format: date
        endsAt:
          type: string
          format: date
        applicationDeadline:
          type: string
          format: date
        publicSafe:
          type: boolean
          default: false

    ProjectPatch:
      type: object
      description: Partial project update. All fields are optional.
      properties:
        title:
          type: string
        description:
          type: string
        organizationName:
          type: string
        location:
          type: string
        modality:
          type: string
          enum: [ onsite, remote, hybrid ]
        categories:
          type: array
          items:
            type: string
        capacity:
          type: integer
        startsAt:
          type: string
          format: date
        endsAt:
          type: string
          format: date
        applicationDeadline:
          type: string
          format: date
        publicSafe:
          type: boolean

    ProjectStatus:
      type: string
      enum:
        [
          draft,
          pending_review,
          published,
          accepting_applications,
          in_execution,
          closed,
          archived,
          rejected,
          cancelled,
          suspended
        ]

    ProjectSourceType:
      type: string
      enum: [ college_created, scraped ]

    FirecrawlRunRequest:
      type: object
      required: [ startUrls ]
      properties:
        startUrls:
          type: array
          items:
            type: string
            format: uri
        query:
          type: string
        maxPages:
          type: integer
          minimum: 1

    ImportRun:
      type: object
      required: [ id, status, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ queued, running, completed, failed ]
        createdAt:
          type: string
          format: date-time

    ImportResult:
      type: object
      required: [ id, status, sourceUrl, extractedProject ]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ImportResultStatus"
        sourceUrl:
          type: string
          format: uri
        extractedProject:
          $ref: "#/components/schemas/ProjectInput"
        extractionConfidence:
          type: number
