openapi: 3.1.0
info:
  title: Social Hours Platform API
  version: 0.1.0
  description: >
    Stack-neutral MVP API contract for a self-hosted social-hours platform.

    The contract includes core platform endpoints, Odoo-like module

    management endpoints, and dummy auth/student-data provider endpoints

    used to demonstrate integration with multiple college-owned systems.


    ## Student RBAC (whitelist)


    Users with only the `student` role may access a fixed allowlist of
    endpoints.

    All other `/api/v1/*` routes return 403. Staff roles (`admin`,
    `coordinator`,

    `faculty_supervisor`, `external_supervisor`, `auditor`) bypass the
    whitelist.


    | Method | Path | Student |

    |--------|------|---------|

    | GET | /api/v1/files/.+, /api/v1/me/?, /api/v1/me/applications,
    /api/v1/me/assignments, /api/v1/me/document-requirements,
    /api/v1/me/document-uploads, /api/v1/me/hour-logs, /api/v1/me/notifications,
    /api/v1/me/profile, /api/v1/me/social-services/history, /api/v1/projects/?,
    /api/v1/projects/{id} | yes (published only) |

    | POST | /api/v1/auth/introspect, /api/v1/auth/login,
    /api/v1/me/document-requirements/{id}/upload, /api/v1/me/evidence,
    /api/v1/me/hour-logs, /api/v1/me/profile/refresh,
    /api/v1/projects/{id}/applications/? | yes |

    | PATCH | /api/v1/me/notifications/{id}/read | yes |
servers:
  - url: https://social-hours.example.edu
    description: Core platform instance
  - url: https://dummy-auth.example.edu
    description: Dummy auth provider
  - url: https://dummy-student-data.example.edu
    description: Dummy student-data provider
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Setup
  - name: Modules
  - name: Provider Connections
  - name: Auth
  - name: Current User
  - name: Student Data
  - name: Student Profile
  - name: Rules
  - name: Projects
  - name: Imports
  - name: Applications
  - name: Assignments
  - name: Hour Logs
  - name: Documents
  - name: Certificates
  - name: Reports
  - name: Audit
  - name: Webhooks
  - name: Demo Auth Provider
  - name: Demo Student Data Provider

paths:
  /health:
    get:
      tags: [ Health ]
      summary: Check platform health
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Platform health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/v1/setup/status:
    get:
      tags: [ Setup ]
      summary: Get first-run setup status
      operationId: getSetupStatus
      security: []
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /api/v1/setup/modules:
    get:
      tags: [ Setup ]
      summary: List modules available during setup
      operationId: listSetupModules
      security: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Module catalog for setup wizard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SetupModuleOption"
        "410":
          description: Setup already completed
    put:
      tags: [ Setup ]
      summary: Install and enable selected domain modules
      operationId: configureSetupModules
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ moduleKeys ]
              properties:
                moduleKeys:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
        "410":
          description: Setup already completed

  /api/v1/setup/instance:
    put:
      tags: [ Setup ]
      summary: Save instance settings during setup
      operationId: saveSetupInstance
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInstanceInput"
      responses:
        "200":
          description: Updated setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
        "410":
          description: Setup already completed

  /api/v1/setup/connectors/{type}:
    put:
      tags: [ Setup ]
      summary: Install and configure an auth or student-data connector
      operationId: configureSetupConnector
      security: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [ auth, student-data ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupConnectorInput"
      responses:
        "200":
          description: Updated setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
        "410":
          description: Setup already completed

  /api/v1/setup/admin:
    post:
      tags: [ Setup ]
      summary: Create initial admin user during setup
      operationId: createSetupAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupAdminInput"
      responses:
        "200":
          description: Updated setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
        "410":
          description: Setup already completed

  /api/v1/setup/test:
    post:
      tags: [ Setup ]
      summary: Test configured connectors during setup
      operationId: testSetupConnectors
      security: []
      responses:
        "200":
          description: Connector test results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupConnectorTestResult"
        "410":
          description: Setup already completed

  /api/v1/setup/complete:
    post:
      tags: [ Setup ]
      summary: Complete first-run setup
      operationId: completeSetup
      security: []
      responses:
        "200":
          description: Setup completed
          content:
            application/json:
              schema:
                type: object
                required: [ completed ]
                properties:
                  completed:
                    type: boolean
                  completedAt:
                    type: string
                    format: date-time
                  baseUrl:
                    type: string
                    format: uri
        "410":
          description: Setup already completed

  /api/v1/capabilities:
    get:
      tags: [ Health ]
      summary: List enabled modules and provider capabilities
      operationId: getCapabilities
      responses:
        "200":
          description: Platform capabilities
          content:
            application/json:
              schema:
                type: object
                required: [ modules, providers ]
                properties:
                  modules:
                    type: array
                    items:
                      $ref: "#/components/schemas/ModuleCapability"
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderCapability"

  /api/v1/modules/available:
    get:
      tags: [ Modules ]
      summary: List available modules in the catalog
      operationId: listAvailableModules
      description: Requires admin role. Returns discoverable modules and whether each
        is installed.
      responses:
        "200":
          description: Available modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableModule"

  /api/v1/modules:
    get:
      tags: [ Modules ]
      summary: List installed modules
      operationId: listModules
      description: Requires admin role.
      responses:
        "200":
          description: Installed modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstalledModule"

  /api/v1/modules/{moduleKey}:
    get:
      tags: [ Modules ]
      summary: Get an installed module
      operationId: getModule
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Installed module
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledModule"

  /api/v1/modules/{moduleKey}/manifest:
    get:
      tags: [ Modules ]
      summary: Get module manifest
      operationId: getModuleManifest
      description: Available to any authenticated user.
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleManifest"

  /api/v1/modules/{moduleKey}/install:
    post:
      tags: [ Modules ]
      summary: Install a module
      operationId: installModule
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "201":
          description: Module installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledModule"

  /api/v1/modules/{moduleKey}/uninstall:
    post:
      tags: [ Modules ]
      summary: Uninstall a module
      operationId: uninstallModule
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module uninstalled
          content:
            application/json:
              schema:
                type: object
                required: [ moduleKey, uninstalled ]
                properties:
                  moduleKey:
                    type: string
                  uninstalled:
                    type: boolean

  /api/v1/modules/{moduleKey}/enable:
    post:
      tags: [ Modules ]
      summary: Enable an installed module
      operationId: enableModule
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledModule"

  /api/v1/modules/{moduleKey}/disable:
    post:
      tags: [ Modules ]
      summary: Disable an installed module
      operationId: disableModule
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledModule"

  /api/v1/modules/{moduleKey}/config:
    get:
      tags: [ Modules ]
      summary: Get module configuration
      operationId: getModuleConfig
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module configuration without secret values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleConfig"
    put:
      tags: [ Modules ]
      summary: Configure a module
      operationId: configureModule
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleConfigInput"
      responses:
        "200":
          description: Module configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleConfig"

  /api/v1/modules/{moduleKey}/features:
    get:
      tags: [ Modules ]
      summary: List module feature toggles
      operationId: listModuleFeatures
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module features
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleFeature"
    put:
      tags: [ Modules ]
      summary: Update module feature toggles
      operationId: updateModuleFeatures
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleFeaturesInput"
      responses:
        "200":
          description: Updated module features
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleFeature"

  /api/v1/modules/{moduleKey}/test:
    post:
      tags: [ Modules ]
      summary: Test module connection and contract readiness
      operationId: testModule
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleTestResult"

  /api/v1/modules/{moduleKey}/health:
    get:
      tags: [ Modules ]
      summary: Get module health
      operationId: getModuleHealth
      description: Available to any authenticated user.
      parameters:
        - $ref: "#/components/parameters/ModuleKey"
      responses:
        "200":
          description: Module health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleHealth"

  /api/v1/provider-connections:
    get:
      tags: [ Provider Connections ]
      summary: List provider connections
      operationId: listProviderConnections
      description: Requires admin role.
      responses:
        "200":
          description: Provider connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderConnection"
    post:
      tags: [ Provider Connections ]
      summary: Create a provider connection
      operationId: createProviderConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderConnectionRequest"
      responses:
        "201":
          description: Provider connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"

  /api/v1/provider-connections/{providerId}:
    get:
      tags: [ Provider Connections ]
      summary: Get a provider connection
      operationId: getProviderConnection
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
    patch:
      tags: [ Provider Connections ]
      summary: Update a provider connection
      operationId: updateProviderConnection
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderConnectionRequest"
      responses:
        "200":
          description: Provider connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"

  /api/v1/provider-connections/{providerId}/test:
    post:
      tags: [ Provider Connections ]
      summary: Test a provider connection
      operationId: testProviderConnection
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderTestResult"

  /api/v1/provider-connections/{providerId}/schema:
    get:
      tags: [ Provider Connections ]
      summary: Get provider schema metadata
      operationId: getProviderSchema
      description: Available to any authenticated user. Returns student-data schema
        when the connection type is student_data.
      parameters:
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider schema metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSchema"

  /api/v1/auth/login:
    post:
      tags: [ Auth ]
      summary: Login through the enabled auth connector module
      operationId: loginThroughAuthModule
      security: []
      description: >
        Delegates to the currently enabled auth connector module.
        providerProfile is forwarded to the connector when supported.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Auth token created by the active auth connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"

  /api/v1/auth/introspect:
    post:
      tags: [ Auth ]
      summary: Introspect a token through the enabled auth connector module
      operationId: introspectThroughAuthModule
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ token ]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token introspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthIntrospectionResult"

  /api/v1/student-data/students:
    get:
      tags: [ Student Data ]
      summary: Search students through the enabled student-data connector module
      operationId: searchStudentsThroughModule
      description: Requires coordinator, admin, or faculty_supervisor role. Returns an
        empty array when query is omitted.
      parameters:
        - in: query
          name: query
          schema:
            type: string
      responses:
        "200":
          description: Students returned by the active student-data connector
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentSearchResult"

  /api/v1/student-data/students/{studentRef}/academic-profile:
    get:
      tags: [ Student Data ]
      summary: Get normalized academic profile through the enabled student-data
        connector module
      operationId: getStudentAcademicProfileThroughModule
      parameters:
        - $ref: "#/components/parameters/StudentRef"
      responses:
        "200":
          description: Normalized academic profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicProfile"

  /api/v1/student-data/schema:
    get:
      tags: [ Student Data ]
      summary: Get schema metadata from the enabled student-data connector module
      operationId: getStudentDataSchemaThroughModule
      responses:
        "200":
          description: Student-data schema metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSchema"

  /api/v1/me:
    get:
      tags: [ Current User ]
      summary: Get current user context
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /api/v1/me/profile:
    get:
      tags: [ Student Profile ]
      summary: Get current student's generated profile
      operationId: getMyStudentProfile
      description: Requires the authenticated user to have a studentRef. Returns 403
        otherwise.
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "403":
          description: Current user is not a student

  /api/v1/me/profile/refresh:
    post:
      tags: [ Student Profile ]
      summary: Refresh current student's profile from external student-data provider
      operationId: refreshMyStudentProfile
      description: Requires the authenticated user to have a studentRef. Returns 403
        otherwise.
      responses:
        "200":
          description: Refreshed student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "403":
          description: Current user is not a student

  /api/v1/me/applications:
    get:
      tags: [ Current User ]
      summary: List current student's project applications
      operationId: getMyApplications
      x-roles: [ student ]
      responses:
        "200":
          description: Student applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectApplication"

  /api/v1/me/assignments:
    get:
      tags: [ Current User ]
      summary: List current student's assignments
      operationId: getMyAssignments
      x-roles: [ student ]
      responses:
        "200":
          description: Student assignments with embedded project

  /api/v1/me/hour-logs:
    get:
      tags: [ Current User ]
      summary: List current student's hour logs
      operationId: getMyHourLogs
      x-roles: [ student ]
      responses:
        "200":
          description: Hour logs for student assignments
    post:
      tags: [ Current User ]
      summary: Create hour log for active assignment
      operationId: createMyHourLog
      x-roles: [ student ]
      responses:
        "201":
          description: Hour log created

  /api/v1/me/evidence:
    post:
      tags: [ Current User ]
      summary: Upload evidence file for hour logs
      operationId: uploadMyEvidence
      x-roles: [ student ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Evidence uploaded

  /api/v1/me/document-requirements:
    get:
      tags: [ Documents ]
      summary: List applicable document requirements with upload status
      operationId: getMyDocumentRequirements
      x-roles: [ student ]
      responses:
        "200":
          description: Document requirement matrix

  /api/v1/me/document-requirements/{requirementId}/upload:
    post:
      tags: [ Documents ]
      summary: Upload document for a requirement
      operationId: uploadMyDocument
      x-roles: [ student ]
      parameters:
        - in: path
          name: requirementId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Document upload registered

  /api/v1/me/document-uploads:
    get:
      tags: [ Documents ]
      summary: List current student's document uploads
      operationId: getMyDocumentUploads
      x-roles: [ student ]
      responses:
        "200":
          description: Document uploads

  /api/v1/me/notifications:
    get:
      tags: [ Current User ]
      summary: Student notification inbox
      operationId: getMyNotifications
      x-roles: [ student ]
      responses:
        "200":
          description: Notifications

  /api/v1/me/notifications/{id}/read:
    patch:
      tags: [ Current User ]
      summary: Mark notification as read
      operationId: markMyNotificationRead
      x-roles: [ student ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated notification

  /api/v1/me/social-services/history:
    get:
      tags: [ Current User ]
      summary: Completed social service participations
      operationId: getMySocialServicesHistory
      x-roles: [ student ]
      responses:
        "200":
          description: Social service history

  /api/v1/rules:
    get:
      tags: [ Rules ]
      summary: List requirement rules
      operationId: listRules
      description: Returns only active rules, optionally filtered by scope query parameters.
      parameters:
        - in: query
          name: facultyCode
          schema:
            type: string
        - in: query
          name: programCode
          schema:
            type: string
        - in: query
          name: degreeLevel
          schema:
            type: string
      responses:
        "200":
          description: Requirement rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequirementRule"
    post:
      tags: [ Rules ]
      summary: Create a requirement rule
      operationId: createRule
      description: Requires admin or coordinator role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementRuleInput"
      responses:
        "201":
          description: Requirement rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementRule"

  /api/v1/rules/evaluate:
    post:
      tags: [ Rules ]
      summary: Evaluate student eligibility and requirements
      operationId: evaluateRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleEvaluationRequest"
      responses:
        "200":
          description: Rule evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleEvaluationResult"

  /api/v1/projects:
    get:
      tags: [ Projects ]
      summary: List projects
      operationId: listProjects
      description: Students only see projects with status published,
        accepting_applications, or in_execution unless they also hold admin or
        coordinator role.
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ProjectStatus"
        - in: query
          name: sourceType
          schema:
            $ref: "#/components/schemas/ProjectSourceType"
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [ Projects ]
      summary: Create a college-owned project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /api/v1/projects/{projectId}:
    get:
      tags: [ Projects ]
      summary: Get a project
      operationId: getProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
